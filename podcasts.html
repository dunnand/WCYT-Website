<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Podcasts &mdash; The Point 91 FM &middot; WCYT</title>
  <meta name="description" content="Listen to student-made programs and sportscasts from The Point 91 FM — WCYT at Homestead High School.">
  <link rel="icon" type="image/x-icon" href="https://images.squarespace-cdn.com/content/v1/66213a95afc386140701f167/1713453742941-Z0LFTEREVU8L8RIFHHUL/favicon.ico?format=100w">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0d0d0d;
      --dark:   #111111;
      --mid:    #1a1a1a;
      --border: #222222;
      --accent: #c8102e;
      --muted:  #888888;
      --white:  #ffffff;
      --font:   'Space Grotesk', sans-serif;
    }

    html { font-family: var(--font); background: var(--black); color: var(--white); }
    body { min-height: 100vh; display: flex; flex-direction: column; }
    a    { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    .site-nav {
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #1a1a1a;
    }
    .site-nav-logo img { height: 36px; display: block; }
    .site-nav-back {
      color: #aaa;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .site-nav-back:hover { color: var(--white); }
    .site-nav-back svg { width: 14px; height: 14px; }

    /* ── Page header ── */
    .page-header {
      background: var(--black);
      color: var(--white);
      padding: 48px 32px 40px;
      border-bottom: 3px solid var(--accent);
    }
    .page-header-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 8px;
    }
    .page-header h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      line-height: 1.1;
    }
    .page-header h1 strong { color: var(--accent); }
    .page-header-note {
      margin-top: 10px;
      font-size: 13px;
      color: #888;
    }

    /* ── Main ── */
    .podcasts-main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Subscribe strip ── */
    .subscribe-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }
    .subscribe-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 4px;
    }
    .platform-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--mid);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
      transition: border-color .2s, background .2s, transform .15s;
    }
    .platform-btn:hover {
      border-color: var(--accent);
      background: #222;
      transform: translateY(-2px);
    }
    .platform-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── Section heading ── */
    .section-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 24px;
    }

    /* ── Latest episode (featured) ── */
    .featured-episode {
      background: var(--mid);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 40px;
    }
    .featured-art {
      flex-shrink: 0;
      width: 100px;
      height: 100px;
      border-radius: 8px;
      object-fit: cover;
      background: #333;
    }
    .featured-info { min-width: 0; }
    .featured-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .featured-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .featured-date {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .featured-desc {
      font-size: 13px;
      color: #bbb;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .listen-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--accent);
      color: var(--white);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      transition: background .2s, transform .15s;
    }
    .listen-btn:hover { background: #a50d26; transform: translateY(-1px); }

    /* ── Episode list ── */
    .episode-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 48px;
    }
    .episode-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--mid);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color .2s, transform .15s;
    }
    .episode-card:hover {
      border-color: #444;
      transform: translateY(-1px);
    }
    .episode-art {
      flex-shrink: 0;
      width: 60px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
      background: #333;
    }
    .episode-info { flex: 1; min-width: 0; }
    .episode-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .episode-date {
      font-size: 12px;
      color: var(--muted);
    }
    .episode-listen {
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      padding: 6px 12px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      transition: background .2s, color .2s;
    }
    .episode-listen:hover { background: var(--accent); color: var(--white); }

    /* ── Loading / error ── */
    .ep-loading, .ep-error {
      color: var(--muted);
      font-size: 14px;
      padding: 24px 0;
    }

    /* ── Footer ── */
    .site-footer {
      background: var(--black);
      color: #444;
      text-align: center;
      padding: 24px;
      font-size: 12px;
      border-top: 1px solid #1a1a1a;
    }
    .site-footer a { color: #666; }
    .site-footer a:hover { color: #aaa; }

    @media (max-width: 600px) {
      .site-nav { padding: 0 20px; }
      .page-header { padding: 32px 20px 28px; }
      .podcasts-main { padding: 32px 16px 60px; }
      .featured-episode { flex-direction: column; }
      .featured-art { width: 80px; height: 80px; }
      .episode-listen { display: none; }
    }
  </style>
</head>

<body>

  <nav class="site-nav">
    <a class="site-nav-logo" href="/" aria-label="The Point 91 FM – Home">
      <img src="https://images.squarespace-cdn.com/content/v1/66213a95afc386140701f167/1713453740425-M44AKIWYWNTFZHGQWZDY/WCYT-removebg-preview.png" alt="WCYT The Point 91 FM">
    </a>
    <a class="site-nav-back" href="/">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg>
      Back to site
    </a>
  </nav>

  <header class="page-header">
    <div class="page-header-eyebrow">The Point 91 FM &middot; WCYT</div>
    <h1>Our <strong>Podcasts</strong></h1>
    <p class="page-header-note">Student-made programs and sportscasts from Homestead High School.</p>
  </header>

  <main class="podcasts-main">

    <!-- Subscribe strip -->
    <div class="subscribe-strip">
      <span class="subscribe-label">Listen on</span>

      <a class="platform-btn" href="https://open.spotify.com/show/7g9PiMxCO93XMKJzLkLu7D" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Spotify
      </a>

      <a class="platform-btn" href="https://itunes.apple.com/us/podcast/wcyt-student-productions/id1354627392" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M18.77 11.085c-.03-3.3 2.694-4.89 2.817-4.965-1.532-2.244-3.921-2.55-4.773-2.58-2.025-.207-3.963 1.2-4.995 1.2-1.035 0-2.625-1.17-4.32-1.14-2.214.033-4.263 1.29-5.4 3.27-2.31 4.005-.591 9.945 1.65 13.2 1.098 1.59 2.4 3.375 4.125 3.315 1.65-.06 2.28-1.065 4.275-1.065 1.995 0 2.565 1.065 4.32 1.035 1.785-.03 2.91-1.62 3.99-3.225 1.26-1.845 1.785-3.63 1.815-3.72-.039-.015-3.48-1.335-3.51-5.325zm-3.285-9.78c.915-1.11 1.53-2.64 1.365-4.17-1.32.054-2.91.879-3.855 1.989-.846.975-1.59 2.535-1.395 4.02 1.47.114 2.97-.75 3.885-1.839z"/></svg>
        Apple Podcasts
      </a>

      <a class="platform-btn" href="https://anchor.fm/s/2b0e634/podcast/rss" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="#f26522"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M6.18 11.8a6.02 6.02 0 0 1 6.02 6.02v.36H10.1v-.36a3.93 3.93 0 0 0-3.92-3.92a3.93 3.93 0 0 0-3.92 3.92v.36H.17v-.36A6.02 6.02 0 0 1 6.18 11.8m0-3.8A9.82 9.82 0 0 1 16 17.82v.36h-2.09v-.36A7.73 7.73 0 0 0 6.18 10.1a7.73 7.73 0 0 0-7.73 7.72v.36H-3.64v-.36A9.82 9.82 0 0 1 6.18 8z" transform="translate(4 2)"/></svg>
        RSS Feed
      </a>
    </div>

    <!-- Latest episode -->
    <div class="section-heading">Latest Episode</div>
    <div id="pod-featured"><p class="ep-loading">Loading latest episode&hellip;</p></div>

    <!-- All episodes -->
    <div class="section-heading">All Episodes</div>
    <div id="pod-list"><p class="ep-loading">Loading episodes&hellip;</p></div>

  </main>

  <footer class="site-footer">
    <p>&copy; WCYT &middot; The Point 91 FM &middot; Homestead High School, Fort Wayne, IN</p>
  </footer>

  <script src="/playlist-widget.js"></script>
  <script>WCYTPlaylist.init(null, null, null);</script>

  <script>
    const RSS_URL = 'https://anchor.fm/s/2b0e634/podcast/rss';
    const API     = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(RSS_URL) + '&api_key=&count=50';

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtDate(str) {
      if (!str) return '';
      const d = new Date(str);
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function stripHtml(s) {
      return String(s ?? '').replace(/<[^>]*>/g, '').trim();
    }

    function renderFeatured(ep, showArt) {
      const art  = ep.thumbnail || showArt || '';
      const desc = stripHtml(ep.description || ep.content || '');
      document.getElementById('pod-featured').innerHTML = `
        <div class="featured-episode">
          ${art ? `<img class="featured-art" src="${esc(art)}" alt="${esc(ep.title)}">` : ''}
          <div class="featured-info">
            <div class="featured-badge">Latest Episode</div>
            <div class="featured-title">${esc(ep.title)}</div>
            <div class="featured-date">${fmtDate(ep.pubDate)}</div>
            <div class="featured-desc">${esc(desc)}</div>
            <a class="listen-btn" href="${esc(ep.link)}" target="_blank" rel="noopener">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              Listen now
            </a>
          </div>
        </div>`;
    }

    function renderList(items, showArt) {
      if (!items.length) {
        document.getElementById('pod-list').innerHTML = '<p class="ep-error">No episodes found.</p>';
        return;
      }
      document.getElementById('pod-list').innerHTML = `
        <div class="episode-list">
          ${items.map(ep => {
            const art = ep.thumbnail || showArt || '';
            return `
            <a class="episode-card" href="${esc(ep.link)}" target="_blank" rel="noopener">
              ${art ? `<img class="episode-art" src="${esc(art)}" alt="${esc(ep.title)}" loading="lazy">` : ''}
              <div class="episode-info">
                <div class="episode-title">${esc(ep.title)}</div>
                <div class="episode-date">${fmtDate(ep.pubDate)}</div>
              </div>
              <span class="episode-listen">Listen &rarr;</span>
            </a>`;
          }).join('')}
        </div>`;
    }

    fetch(API)
      .then(r => r.json())
      .then(data => {
        if (data.status !== 'ok' || !data.items?.length) throw new Error('No episodes');
        const showArt = data.feed?.image || '';
        renderFeatured(data.items[0], showArt);
        renderList(data.items.slice(1), showArt);
      })
      .catch(() => {
        document.getElementById('pod-featured').innerHTML = '<p class="ep-error">Could not load episodes. <a href="https://open.spotify.com/show/7g9PiMxCO93XMKJzLkLu7D" target="_blank">Listen on Spotify &rarr;</a></p>';
        document.getElementById('pod-list').innerHTML = '';
      });
  </script>

</body>
</html>
