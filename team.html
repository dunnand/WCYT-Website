  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0d0d0d;
      --dark:   #111111;
      --mid:    #1a1a1a;
      --border: #222222;
      --accent: #c8102e;
      --muted:  #888888;
      --white:  #ffffff;
      --font:   'Space Grotesk', sans-serif;
    }

    html { font-family: var(--font); background: var(--black); color: var(--white); }
    body { min-height: 100vh; display: flex; flex-direction: column; }
    a    { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    .site-nav {
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #1a1a1a;
    }
    .site-nav-logo img { height: 36px; display: block; }
    .site-nav-back {
      color: #aaa;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .site-nav-back:hover { color: var(--white); }
    .site-nav-back svg { width: 14px; height: 14px; }

    /* ── Page header ── */
    .page-header {
      background: var(--black);
      color: var(--white);
      padding: 48px 32px 40px;
      border-bottom: 3px solid var(--accent);
    }
    .page-header-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 8px;
    }
    .page-header h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      line-height: 1.1;
    }
    .page-header h1 strong { color: var(--accent); }
    .page-header-note {
      margin-top: 10px;
      font-size: 13px;
      color: #888;
    }

    /* ── Main ── */
    .team-main {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Section heading ── */
    .team-section-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 32px;
    }

    /* ── Grid ── */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 28px;
      margin-bottom: 60px;
    }

    .team-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      padding: 20px 12px;
      background: var(--mid);
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }
    .team-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }

    .team-photo {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 2px solid var(--border);
      transition: border-color .2s;
      background: #333;
    }
    .team-card:hover .team-photo { border-color: var(--accent); }

    .team-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }

    .team-role {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ── Managers grid (fewer, larger) ── */
    .team-grid--mgmt {
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      max-width: 520px;
    }
    .team-grid--mgmt .team-photo {
      width: 180px;
      height: 180px;
    }
    .team-grid--mgmt .team-name { font-size: 17px; }
    .team-grid--mgmt .team-role {
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Footer ── */
    .site-footer {
      background: var(--black);
      color: #444;
      text-align: center;
      padding: 24px;
      font-size: 12px;
      border-top: 1px solid #1a1a1a;
    }
    .site-footer a { color: #666; }
    .site-footer a:hover { color: #aaa; }

    @media (max-width: 600px) {
      .site-nav { padding: 0 20px; }
      .page-header { padding: 32px 20px 28px; }
      .team-main { padding: 32px 16px 60px; }
      .team-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function parseCSV(text) {
      const rows = [];
      const lines = text.trim().split(/\r?\n/);
      const headers = splitCSVLine(lines[0]).map(h => h.trim().toLowerCase());
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const vals = splitCSVLine(lines[i]);
        const obj = {};
        headers.forEach((h, j) => { obj[h] = (vals[j] ?? '').trim(); });
        rows.push(obj);
      }
      return rows;
    }

    function splitCSVLine(line) {
      const result = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (c === ',' && !inQ) {
          result.push(cur); cur = '';
        } else {
          cur += c;
        }
      }
      result.push(cur);
      return result;
    }

    function photoUrl(url) {
      const m = (url || '').match(/\/d\/([^/?]+)/);
      return m ? `https://drive.google.com/thumbnail?id=${m[1]}&sz=w500` : url;
    }

    function renderGrid(el, members) {
      el.innerHTML = members.map(m => `
        <div class="team-card">
          <img class="team-photo" src="${esc(photoUrl(m.photo))}" alt="${esc(m.name)}" loading="lazy"
               onerror="this.style.opacity='0'">
          <div class="team-name">${esc(m.name)}</div>
          <div class="team-role">${esc(m.show)}</div>
        </div>`).join('');
    }

    function renderTeam(members) {
      const personalities = members.filter(m => m.section !== 'Management');
      const management    = members.filter(m => m.section === 'Management');
      renderGrid(document.getElementById('team-personalities'), personalities);
      if (management.length) {
        document.getElementById('team-mgmt-heading').style.display = '';
        renderGrid(document.getElementById('team-management'), management);
      }
    }

    if (TEAM_SHEET_URL) {
      fetch(TEAM_SHEET_URL)
        .then(r => r.text())
        .then(csv => renderTeam(parseCSV(csv)))
        .catch(() => renderTeam(FALLBACK_MEMBERS));
    } else {
      renderTeam(FALLBACK_MEMBERS);
    }
