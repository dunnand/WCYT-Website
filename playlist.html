<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Playlist &mdash; The Point 91 FM · WCYT</title>
  <meta name="description" content="See what's playing right now and what's been on The Point 91 FM — WCYT.">
  <link rel="icon" type="image/x-icon" href="https://images.squarespace-cdn.com/content/v1/66213a95afc386140701f167/1713453742941-Z0LFTEREVU8L8RIFHHUL/favicon.ico?format=100w">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #0d0d0d;
      --dark:    #111111;
      --mid:     #1a1a1a;
      --card:    #161616;
      --border:  #2a2a2a;
      --muted:   #888888;
      --accent:  #c8102e;
      --white:   #ffffff;
      --font:    'Space Grotesk', sans-serif;
    }

    html { font-family: var(--font); background: var(--black); color: var(--white); }
    body { min-height: 100vh; display: flex; flex-direction: column; }
    a    { color: inherit; }

    /* ── Page header ── */
    .page-header {
      background: var(--dark);
      color: var(--white);
      padding: 48px 32px 40px;
      border-bottom: 3px solid var(--accent);
    }
    .page-header-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 8px;
    }
    .page-header h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      line-height: 1.1;
    }
    .page-header h1 strong { color: var(--accent); }
    .page-header-note {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }

    /* ── Main content ── */
    .playlist-main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Now-playing card ── */
    .wcyt-full-now-card {
      position: relative;
      overflow: hidden;
      background: var(--card);
      color: var(--white);
      border-radius: 12px;
      padding: 28px 32px 32px;
      margin-bottom: 48px;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
      border: 1px solid var(--border);
    }
    .wcyt-backdrop {
      position: absolute;
      inset: -30px;
      background-size: cover;
      background-position: center;
      filter: blur(28px);
      opacity: 0.5;
      z-index: 0;
      transition: opacity .4s;
    }
    .wcyt-backdrop::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
    }
    .wcyt-full-card-header,
    .wcyt-full-song { position: relative; z-index: 1; }
    .wcyt-full-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    /* ── Label ── */
    .wcyt-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── Equalizer bars ── */
    .wcyt-bars {
      display: inline-flex;
      align-items: flex-end;
      gap: 3px;
      height: 18px;
    }
    .wcyt-bars span {
      display: block;
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      transform-origin: bottom;
      animation-duration: 2.2s;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }
    .wcyt-bars span:nth-child(1) { animation-name: eq-bar-1; animation-delay: 0s;   height: 8px;  }
    .wcyt-bars span:nth-child(2) { animation-name: eq-bar-2; animation-delay: .15s; height: 14px; }
    .wcyt-bars span:nth-child(3) { animation-name: eq-bar-3; animation-delay: .05s; height: 10px; }
    .wcyt-bars span:nth-child(4) { animation-name: eq-bar-4; animation-delay: .25s; height: 16px; }
    .wcyt-bars span:nth-child(5) { animation-name: eq-bar-5; animation-delay: .1s;  height: 6px;  }
    .wcyt-bars--lg span { width: 4px; }
    .wcyt-bars--lg { height: 22px; }
    @keyframes eq-bar-1 { 0%,100% { transform: scaleY(.35); } 50% { transform: scaleY(.8);  } }
    @keyframes eq-bar-2 { 0%,100% { transform: scaleY(.2);  } 50% { transform: scaleY(1);   } }
    @keyframes eq-bar-3 { 0%,100% { transform: scaleY(.3);  } 50% { transform: scaleY(.95); } }
    @keyframes eq-bar-4 { 0%,100% { transform: scaleY(.15); } 50% { transform: scaleY(1);   } }
    @keyframes eq-bar-5 { 0%,100% { transform: scaleY(.45); } 50% { transform: scaleY(.75); } }

    .wcyt-full-song {
      display: flex;
      align-items: flex-start;
      gap: 24px;
    }
    .wcyt-full-art {
      flex-shrink: 0;
      width: 340px;
      height: 340px;
      border-radius: 8px;
      object-fit: cover;
      background: #333;
      box-shadow: 0 4px 16px rgba(0,0,0,.6);
    }
    .wcyt-full-art.wcyt-art-fallback {
      object-fit: contain;
      padding: 16px;
      background: #222;
    }
    .wcyt-full-song-text { min-width: 0; }
    .wcyt-full-artist {
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .wcyt-full-title {
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 400;
      color: #bbb;
      line-height: 1.3;
      margin-bottom: 20px;
    }
    .wcyt-full-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .wcyt-age {
      font-size: 13px;
      color: #666;
    }
    .wcyt-play-btn {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: var(--white);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: background .2s, transform .2s;
    }
    .wcyt-play-btn:hover { background: #a50d26; transform: scale(1.08); }
    .wcyt-play-btn[data-wcyt-playbtn="buffering"] { background: #555; cursor: wait; }
    .wcyt-play-btn[data-wcyt-playbtn="playing"]   { background: #333; }
    .wcyt-play-btn[data-wcyt-playbtn="playing"]:hover { background: #444; }
    .wcyt-btn-icon   { line-height: 1; display: block; }
    .wcyt-btn-spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      display: block;
      animation: wcyt-spin .7s linear infinite;
    }
    @keyframes wcyt-spin { to { transform: rotate(360deg); } }

    /* ── History section ── */
    .wcyt-full-history-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      padding-bottom: 12px;
      margin-bottom: 8px;
    }
    .wcyt-full-history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .wcyt-history-art--full {
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      border-radius: 6px;
      object-fit: cover;
      background: #222;
    }
    .wcyt-history-art--full.wcyt-art-fallback {
      object-fit: contain;
      padding: 6px;
      background: #1a1a1a;
    }
    .wcyt-full-history-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: var(--card);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      transition: background .15s, transform .15s;
    }
    .wcyt-full-history-item:hover {
      background: #1e1e1e;
      transform: translateY(-1px);
    }
    .wcyt-history-time {
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      width: 52px;
      text-align: center;
      background: rgba(200,16,46,.12);
      padding: 4px 6px;
      border-radius: 4px;
    }
    .wcyt-full-history-track {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .wcyt-full-history-artist {
      font-weight: 700;
      font-size: 15px;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .wcyt-full-history-title {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .wcyt-history-empty {
      padding: 40px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    /* ── Loading / error ── */
    .wcyt-loading { color: #666; font-size: 15px; padding: 12px 0; }
    .wcyt-error   { color: #666; font-size: 14px; padding: 12px 0; }
    .wcyt-error a { color: var(--accent); }

    /* ── Recent Shows ── */
    .recent-shows-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      border-top: 1px solid var(--border);
      padding-top: 40px;
      margin-top: 48px;
      margin-bottom: 20px;
    }
    .recent-shows-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .recent-show-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
    }
    .recent-show-img {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 6px;
      object-fit: cover;
      background: #222;
    }
    .recent-show-img.fallback {
      object-fit: contain;
      padding: 6px;
      background: #1a1a1a;
    }
    .recent-show-info {
      min-width: 0;
      flex: 1;
    }
    .recent-show-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .recent-show-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }
    .recent-show-station {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(200,16,46,.1);
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: 8px;
    }

    /* ── Footer ── */
    .site-footer {
      background: var(--dark);
      color: #444;
      text-align: center;
      padding: 24px;
      font-size: 12px;
      border-top: 1px solid #1a1a1a;
    }
    .site-footer a { color: #666; text-decoration: none; }
    .site-footer a:hover { color: #aaa; }
    .site-footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-bottom: 10px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page-header { padding: 32px 20px 28px; }
      .playlist-main { padding: 28px 16px 60px; }
      .wcyt-full-now-card { padding: 20px; }
      .wcyt-full-song { flex-direction: column; align-items: center; }
      .wcyt-full-art { width: 260px; height: 260px; }
    }
  </style>
</head>

<body>

  <!-- Page header -->
  <header class="page-header">
    <div class="page-header-eyebrow" id="pl-eyebrow">The Point 91 FM &middot; WCYT</div>
    <h1>Live <strong>Playlist</strong></h1>
    <p class="page-header-note">
      Showing what's on air right now &mdash; recently played updates automatically.
    </p>
  </header>

  <!-- Widget mount point -->
  <main class="playlist-main">
    <div id="wcyt-full-widget"></div>

    <!-- Recently Played -->
    <div class="recent-shows-header">Recently Played</div>
    <div id="recent-shows-nav"></div>
    <div class="recent-shows-list" id="recent-shows-list">
      <div class="wcyt-loading">Loading recently played&hellip;</div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="site-footer-links">
      <a href="/playlist">Playlist</a>
      <a href="/podcasts">Podcasts</a>
      <a href="/sports">Sports</a>
      <a href="/team">Team</a>
      <a href="/awards">Awards</a>
      <a href="/contact">Contact</a>
      <a href="https://publicfiles.fcc.gov/fm-profile/wcyt" target="_blank" rel="noopener">FCC Filing</a>
    </div>
    <p>&copy; WCYT &middot; The Point 91 FM &middot; Homestead High School, Fort Wayne, IN</p>
  </footer>

  <style>
    .wcyt-full { width: 100%; }
  </style>

  <script src="/nav.js"></script>
  <script src="/playlist-widget.js"></script>
  <script>
    const _s = new URLSearchParams(location.search).get('s');
    const _stationIdx = _s === '2' ? 1 : 0;
    if (_stationIdx === 1) {
      document.title = '2.0 Next Level of Radio \u2014 Live Playlist \u00b7 WCYT';
      document.getElementById('pl-eyebrow').textContent = '2.0 Next Level of Radio \u00b7 WCYT';
    }
    WCYTPlaylist.init(null, null, document.getElementById('wcyt-full-widget'), _stationIdx);
  </script>

  <style>
    .hour-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .hour-nav-label {
      font-size: 14px;
      font-weight: 700;
      color: #ccc;
    }
    .hour-nav-sub {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }
    .hour-nav-arrows {
      display: flex;
      gap: 8px;
    }
    .hour-arrow {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: #161616;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
    }
    .hour-arrow:hover:not(:disabled) { background: #222; border-color: #c8102e; }
    .hour-arrow:disabled { opacity: .25; cursor: not-allowed; }
  </style>

  <script>
    // ── Recently Played (Spinitron + iTunes art, grouped by hour) ─────
    const SPINITRON_URL = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://spinitron.com/api/spins?access-token=ag1eWuFDy-aqMiQ0CAoDibBW&count=50');
    const FALLBACK_IMG  = 'https://images.squarespace-cdn.com/content/v1/66213a95afc386140701f167/1713453740425-M44AKIWYWNTFZHGQWZDY/WCYT-removebg-preview.png';

    let hourGroups  = [];  // [{ label, sublabel, spins[] }, ...]
    let currentHour = 0;  // index into hourGroups (0 = most recent)

    function hourKey(isoString) {
      const d = new Date(isoString);
      return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}-${d.getHours()}`;
    }

    function hourLabel(isoString) {
      const d = new Date(isoString);
      return d.toLocaleTimeString([], { hour: 'numeric', hour12: true });
    }

    function hourSublabel(isoString) {
      const d   = new Date(isoString);
      const now = new Date();
      if (d.toDateString() === now.toDateString()) return 'Today';
      return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function spinTime(isoString) {
      return new Date(isoString).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    function groupByHour(spins) {
      const map = new Map();
      spins.forEach(spin => {
        if (!spin.start) return;
        const key = hourKey(spin.start);
        if (!map.has(key)) map.set(key, { label: hourLabel(spin.start), sublabel: hourSublabel(spin.start), spins: [] });
        map.get(key).spins.push(spin);
      });
      return [...map.values()]; // newest first (Spinitron returns newest first)
    }

    function renderHour(idx) {
      const group = hourGroups[idx];
      const el    = document.getElementById('recent-shows-list');

      // Update nav
      document.getElementById('hour-label').textContent    = group.label;
      document.getElementById('hour-sublabel').textContent = group.sublabel;
      document.getElementById('hour-prev').disabled = idx >= hourGroups.length - 1;
      document.getElementById('hour-next').disabled = idx <= 0;

      // Render spins
      el.innerHTML = group.spins.map((spin, i) => {
        const artist = spin.artist || '';
        const title  = spin.song   || '';
        const time   = spin.start  ? spinTime(spin.start) : '';
        const img    = spin.image  || FALLBACK_IMG;
        const uid    = `spin-art-${idx}-${i}`;
        return `
          <div class="recent-show-item">
            <img id="${uid}" class="recent-show-img" src="${img}" alt="${artist}"
                 onerror="this.src='${FALLBACK_IMG}'; this.classList.add('fallback');">
            <div class="recent-show-info">
              <div class="recent-show-name">${artist}</div>
              <div class="recent-show-meta">${title}${time ? `<span class="recent-show-station">${time}</span>` : ''}</div>
            </div>
          </div>`;
      }).join('');

      // Backfill iTunes art
      group.spins.forEach((spin, i) => {
        if (spin.image || !spin.artist) return;
        WCYTPlaylist.fetchArt(spin.artist, spin.song || '').then(url => {
          if (!url) return;
          const img = document.getElementById(`spin-art-${idx}-${i}`);
          if (img) img.src = url;
        });
      });
    }

    function navigate(dir) {
      currentHour = Math.max(0, Math.min(hourGroups.length - 1, currentHour + dir));
      renderHour(currentHour);
    }

    fetch(SPINITRON_URL)
      .then(r => r.json())
      .then(wrapper => {
        const spins = JSON.parse(wrapper.contents).items || [];
        if (!spins.length) {
          document.getElementById('recent-shows-list').innerHTML =
            '<div class="wcyt-loading" style="color:#555">No spins logged yet.</div>';
          return;
        }
        hourGroups = groupByHour(spins);
        // Inject nav controls above the list
        document.getElementById('recent-shows-nav').innerHTML = `
          <div class="hour-nav">
            <div>
              <div class="hour-nav-label" id="hour-label"></div>
              <div class="hour-nav-sub"   id="hour-sublabel"></div>
            </div>
            <div class="hour-nav-arrows">
              <button class="hour-arrow" id="hour-prev" onclick="navigate(1)" title="Earlier">&#8592;</button>
              <button class="hour-arrow" id="hour-next" onclick="navigate(-1)" title="Later">&#8594;</button>
            </div>
          </div>`;
        renderHour(0);
      })
      .catch(() => {
        document.getElementById('recent-shows-list').innerHTML =
          '<div class="wcyt-loading" style="color:#555">Could not load recently played.</div>';
      });
  </script>

</body>
</html>
