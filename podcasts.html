<head>

  <title>Podcasts &mdash; The Point 91 FM &middot; WCYT</title>
  <meta name="description" content="Listen to student-made programs and sportscasts from The Point 91 FM — WCYT at Homestead High School.">
  <link rel="icon" type="image/x-icon" href="https://images.squarespace-cdn.com/content/v1/66213a95afc386140701f167/1713453742941-Z0LFTEREVU8L8RIFHHUL/favicon.ico?format=100w">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0d0d0d;
      --dark:   #111111;
      --mid:    #1a1a1a;
      --border: #222222;
      --accent: #c8102e;
      --muted:  #888888;
      --white:  #ffffff;
      --font:   'Space Grotesk', sans-serif;
    }

    html { font-family: var(--font); background: var(--black); color: var(--white); }
    body { min-height: 100vh; display: flex; flex-direction: column; }
    a    { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    .site-nav {
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #1a1a1a;
    }
    .site-nav-logo img { height: 36px; display: block; }
    .site-nav-back {
      color: #aaa;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .site-nav-back:hover { color: var(--white); }
    .site-nav-back svg { width: 14px; height: 14px; }

    /* ── Page header ── */
    .page-header {
      background: var(--black);
      color: var(--white);
      padding: 48px 32px 40px;
      border-bottom: 3px solid var(--accent);
    }
    .page-header-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 8px;
    }
    .page-header h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      line-height: 1.1;
    }
    .page-header h1 strong { color: var(--accent); }
    .page-header-note {
      margin-top: 10px;
      font-size: 13px;
      color: #888;
    }

    /* ── Main ── */
    .podcasts-main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Spotify embed ── */
    .podcast-player {
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 48px;
    }
    .podcast-player iframe {
      display: block;
      border-radius: 12px;
    }

    /* ── Available on ── */
    .available-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 24px;
    }

    .platform-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .platform-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: var(--mid);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      transition: border-color .2s, background .2s, transform .15s;
    }
    .platform-btn:hover {
      border-color: var(--accent);
      background: #222;
      transform: translateY(-2px);
    }
    .platform-btn svg, .platform-btn img {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    .site-footer {
      background: var(--black);
      color: #444;
      text-align: center;
      padding: 24px;
      font-size: 12px;
      border-top: 1px solid #1a1a1a;
    }
    .site-footer a { color: #666; }
    .site-footer a:hover { color: #aaa; }

    @media (max-width: 600px) {
      .site-nav { padding: 0 20px; }
      .page-header { padding: 32px 20px 28px; }
      .podcasts-main { padding: 32px 16px 60px; }
    }
  </style>
</head>
